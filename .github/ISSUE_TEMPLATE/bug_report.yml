name: 🐛 Bug Report
description: Report a technical issue in Anvil 0.9.7+
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### Direct Reports Only
        If you are reporting a bug, ensure it is reproducible with the latest version of Anvil. Low-effort reports will be closed without comment.
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a clear, concise description of how to trigger the bug.
      placeholder: |
        1. Define an entity.
        2. Add `EntityPushableByBlock` component.
        3. Run 'anvil run'.
        4. The generated JSON is missing the `minecraft:pushable_by_block` component.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should the generated JSON look like?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What did Anvil actually generate? (Paste the JSON snippet or error log).
    validations:
      required: true
  - type: input
    id: reference_link
    attributes:
      label: Optional reference link
      description: Add a link to a Minecraft Learn article, feature docs, or engine bug report if this issue relates to a specific feature.
      placeholder: https://learn.microsoft.com/minecraft/creator/
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Validation Checks
      options:
        - label: I have checked the Minecraft Content Log for engine-side errors.
          required: true
        - label: I have verified this is an Anvil generation error, not an engine limitation.
          required: true
